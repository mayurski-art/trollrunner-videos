<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://mayurski-art.github.io https://platform.twitter.com https://www.tiktok.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self'; connect-src 'self' https://tjsyhfplxjtakdfkpdtg.supabase.co wss://tjsyhfplxjtakdfkpdtg.supabase.co https://www.tiktok.com; frame-src https://drive.google.com https://platform.twitter.com https://www.tiktok.com https://syndication.twitter.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Troll Runner — Videos</title>
<meta name="description" content="Troll Runner video drops. Pixel-nostalgic. Organized by topic. Drive, X & TikTok." />
<meta property="og:title" content="Troll Runner — Videos" />
<meta property="og:description" content="Troll Runner video drops. Pixel-nostalgic. Organized by topic. Drive, X & TikTok." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://videos.trollrunner.net/" />
<!-- og:image intentionally omitted until assets/og-image.png exists -->
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="Troll Runner — Videos" />
<meta name="twitter:description" content="Troll Runner video drops. Pixel-nostalgic. Organized by topic. Drive, X & TikTok." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0b0b1a;
  --bg-2:#13122b;
  --panel:#1a1838;
  --panel-2:#211f47;
  --ink:#e8e6ff;
  --dim:#9b97c9;
  --line:#3a3470;
  --green:#39ff14;
  --magenta:#ff2e88;
  --cyan:#00e5ff;
  --amber:#ffcb2e;
  --drive:#34c759;
  --x:#e8e6ff;
  --tiktok:#ff2e88;
  --pixel: 'Press Start 2P', monospace;
  --body: 'VT323', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--body);
  font-size:20px;
  line-height:1.25;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% -10%, #2a1d63 0%, transparent 45%),
    radial-gradient(circle at 90% 0%, #5a1342 0%, transparent 40%),
    var(--bg);
  background-attachment:fixed;
  image-rendering:pixelated;
  -webkit-font-smoothing:none;
}
/* CRT scanline + flicker overlay */
body::after{
  content:"";
  position:fixed; inset:0; z-index:9000; pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0, rgba(0,0,0,.16) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:multiply;
  animation:flicker 4s infinite steps(60);
}
@keyframes flicker{ 0%,100%{opacity:.85} 50%{opacity:1} }
@media (prefers-reduced-motion: reduce){ body::after{animation:none} }

a{color:var(--cyan);text-decoration:none}
button{font-family:var(--pixel);cursor:pointer}

.pixel-box{
  background:var(--panel);
  border:3px solid var(--line);
  box-shadow:0 0 0 3px #0b0b1a, 6px 6px 0 0 rgba(0,0,0,.55);
}

/* ── HEADER / MONTAGE HERO ── */
header{
  position:relative;
  min-height:clamp(380px,64vh,700px);
  display:flex; align-items:center; justify-content:center;
  padding:48px 18px;
  text-align:center;
  border-bottom:3px solid var(--line);
  background:linear-gradient(180deg,#161433,#0b0b1a);
  overflow:hidden;
}
/* full-bleed montage (DeGods-style) */
.montage{ position:absolute; inset:0; z-index:0; }
.montage-vid{
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; opacity:0; transition:opacity .6s ease;
}
header.has-montage .montage-vid{ opacity:1; }
header.has-montage .montage-ph{ opacity:0; }
.montage-ph{
  position:absolute; inset:0; transition:opacity .6s ease;
  display:flex; align-items:center; justify-content:center;
  background:
    repeating-linear-gradient(115deg,#16142e 0 40px,#1b1840 40px 80px),
    radial-gradient(circle at 28% 25%, #3a1d63, transparent 55%),
    radial-gradient(circle at 82% 75%, #5a1342, transparent 55%);
  background-size:240% 240%, cover, cover;
  animation:montage-pan 16s linear infinite;
}
@keyframes montage-pan{ from{background-position:0 0,0 0,0 0} to{background-position:240% 0,0 0,0 0} }
@media (prefers-reduced-motion: reduce){ .montage-ph{ animation:none; } }
.montage-ph .film{
  position:absolute; left:0; right:0; height:22px; opacity:.7;
  background:repeating-linear-gradient(90deg,#000 0 18px,#2a2750 18px 26px);
}
.montage-ph .film.top{ top:0; } .montage-ph .film.bottom{ bottom:0; }
.montage-scrim{
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(11,11,26,.5) 0%, rgba(11,11,26,.25) 38%, rgba(11,11,26,.9) 100%);
}
.header-inner{ position:relative; z-index:2; }

h1{
  font-family:var(--pixel);
  font-size:clamp(16px,4.4vw,30px);
  line-height:1.4;
  letter-spacing:1px;
  color:var(--green);
  text-shadow:3px 3px 0 #0b0b1a, 0 0 14px rgba(57,255,20,.4);
  margin:10px 0 6px;
}
h1 .arrow{color:var(--magenta)}

.btn{
  font-family:var(--pixel); font-size:10px; color:var(--ink);
  background:var(--panel-2); border:2px solid var(--line);
  padding:9px 12px; box-shadow:3px 3px 0 0 rgba(0,0,0,.5);
}
.btn:hover{ background:var(--line); color:#fff; }
.btn.accent{ background:var(--magenta); color:#0b0b1a; border-color:#ff7ab3; }
.btn.green{ background:var(--green); color:#06280a; border-color:#9affb0; }
.btn:active{ transform:translate(2px,2px); box-shadow:1px 1px 0 0 rgba(0,0,0,.5); }

/* ── CONTROLS ── */
main{ width:min(1120px, calc(100% - 28px)); margin:24px auto 60px; }
.toolbar{
  display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between;
  padding:14px; margin-bottom:18px;
}
.toolbar .left, .toolbar .right{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.search{
  font-family:var(--body); font-size:20px; color:var(--ink);
  background:#0b0b1a; border:2px solid var(--line); padding:7px 10px; min-width:180px;
}
.search::placeholder{color:var(--dim)}

.filter-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; align-items:center; }
.filter-label{ font-family:var(--pixel); font-size:10px; color:var(--dim); margin-right:4px; }
.chip{
  font-family:var(--pixel); font-size:10px; color:var(--ink);
  background:var(--panel); border:2px solid var(--line); padding:7px 9px;
  display:inline-flex; align-items:center; gap:6px;
}
.chip:hover{ border-color:var(--cyan); }
.chip.active{ background:var(--cyan); color:#03252b; border-color:#9af3ff; }
.chip.topic.active{ background:var(--amber); color:#3a2a00; border-color:#ffe49a; }
.chip .x{ color:var(--magenta); font-weight:bold; cursor:pointer; }
.chip.active .x{ color:#03252b; }

/* ── TOPIC SECTIONS ── */
.topic-sec{ margin:30px 0; }
.topic-head{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.topic-head h2{
  font-family:var(--pixel); font-size:14px; color:var(--magenta);
  text-shadow:2px 2px 0 #0b0b1a; letter-spacing:1px;
}
.topic-head .rule{ flex:1; height:0; border-top:3px dashed var(--line); }
.topic-head .count{ font-family:var(--pixel); font-size:10px; color:var(--dim); }

.grid{ display:grid; gap:18px; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); }
.load-more{ display:block; margin:16px auto 0; }

.card{ padding:12px; display:flex; flex-direction:column; gap:10px; }
.media{
  position:relative; width:100%; min-height:140px;
  background:#000; border:2px solid var(--line); overflow:hidden;
}
.media.ratio{ aspect-ratio:16/9; }
.media.ratio.portrait{ aspect-ratio:9/16; }
.media.ratio iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
.media.embed{
  display:flex; justify-content:center; align-items:flex-start;
  max-height:460px; overflow-y:auto; padding:14px 10px;
  scrollbar-color:var(--line) var(--bg); scrollbar-width:thin;
}
.media.embed iframe, .media.embed blockquote, .media.embed twitter-widget{ max-width:100% !important; margin:0 !important; }
.media.embed::-webkit-scrollbar{ width:10px; }
.media.embed::-webkit-scrollbar-track{ background:var(--bg); }
.media.embed::-webkit-scrollbar-thumb{ background:var(--line); border:2px solid var(--bg); }
.media.embed twitter-widget{ animation:tweet-in .35s ease; }
@keyframes tweet-in{ from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }
@media (prefers-reduced-motion: reduce){ .media.embed twitter-widget{ animation:none; } }

/* Tweet loading skeleton — covers the gap between "poster removed" and
   "Twitter's widget.js has actually rendered an iframe" so nothing raw flashes. */
.tweet-skeleton{
  position:absolute; inset:0; z-index:2; background:var(--panel);
  display:flex; flex-direction:column; gap:10px; padding:16px;
}
.tweet-skeleton .top{ display:flex; gap:10px; align-items:center; }
.tweet-skeleton .col{ flex:1; display:flex; flex-direction:column; gap:6px; }
.tweet-skeleton .row{
  height:14px; border-radius:2px;
  background:linear-gradient(90deg, var(--panel-2) 25%, var(--line) 50%, var(--panel-2) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite;
}
.tweet-skeleton .row.avatar{ width:40px; height:40px; flex:none; }
.tweet-skeleton .row.w60{ width:60%; } .tweet-skeleton .row.w90{ width:90%; } .tweet-skeleton .row.full{ width:100%; height:120px; }
@keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
@media (prefers-reduced-motion: reduce){ .tweet-skeleton .row{ animation:none; } }
.poster{
  position:absolute; inset:0; display:flex; flex-direction:column; gap:10px;
  align-items:center; justify-content:center; cursor:pointer; text-align:center; padding:10px;
  background:repeating-linear-gradient(45deg,#16142e,#16142e 8px,#1c1940 8px,#1c1940 16px);
  background-size:cover; background-position:center; background-repeat:no-repeat;
  color:var(--ink);
}
.poster.has-thumb::before{
  content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(11,11,26,.15) 0%, rgba(11,11,26,.65) 100%);
}
.poster .play{
  font-family:var(--pixel); font-size:13px; color:#0b0b1a; background:var(--green);
  border:2px solid #9affb0; padding:10px 14px; box-shadow:3px 3px 0 rgba(0,0,0,.5);
  position:relative; z-index:1;
}
.poster:hover .play{ background:var(--cyan); border-color:#9af3ff; }

.card-head{ display:flex; align-items:center; gap:8px; }
.drag-handle{ cursor:grab; color:var(--dim); font-size:18px; line-height:1; flex:none; user-select:none; }
.drag-handle:active{ cursor:grabbing; }
.card.dragging{ opacity:.4; }
.card .title{
  font-size:22px; line-height:1.1; color:var(--ink);
  flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.badge{
  font-family:var(--pixel); font-size:8px; padding:5px 7px; border:2px solid #000;
  flex:none; color:#0b0b1a;
}
.badge.drive{ background:var(--drive); }
.badge.x{ background:#fff; }
.badge.tiktok{ background:var(--tiktok); color:#fff; border-color:#000; }

.card-tags{ display:flex; flex-wrap:wrap; gap:6px; }
.tag{
  font-family:var(--pixel); font-size:8px; color:var(--cyan);
  background:#0b0b1a; border:2px solid var(--line); padding:5px 7px;
  display:inline-flex; align-items:center; gap:5px; cursor:pointer;
}
.tag:hover{ border-color:var(--cyan); }
.tag .rm{ color:var(--magenta); font-weight:bold; }
.tag.add{ color:var(--amber); border-style:dashed; }

.card-foot{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:2px; }
.card-foot .open{ font-family:var(--pixel); font-size:8px; }
.icon-btn{
  font-family:var(--pixel); font-size:9px; background:var(--panel-2); color:var(--ink);
  border:2px solid var(--line); padding:6px 8px;
}
.icon-btn.danger:hover{ background:var(--magenta); color:#0b0b1a; border-color:#ff7ab3; }

.admin-only{ display:none !important; }
body.is-admin .admin-only{ display:inline-flex !important; }

.empty{ text-align:center; padding:50px 18px; color:var(--dim); font-size:22px; }
.empty .big{ font-family:var(--pixel); font-size:14px; color:var(--amber); display:block; margin-bottom:12px; }

/* ── MODAL ── */
.modal-back{
  position:fixed; inset:0; z-index:9500; display:none;
  background:rgba(3,2,12,.8); align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto;
}
.modal-back.open{ display:flex; }
.modal{ width:min(560px,100%); padding:20px; }
.modal h3{ font-family:var(--pixel); font-size:14px; color:var(--green); margin-bottom:16px; }
.field{ margin-bottom:14px; }
.field label{ font-family:var(--pixel); font-size:9px; color:var(--dim); display:block; margin-bottom:6px; }
.field input{ width:100%; font-family:var(--body); font-size:20px; color:var(--ink); background:#0b0b1a; border:2px solid var(--line); padding:9px 10px; }
.field .hint{ font-size:16px; color:var(--dim); margin-top:5px; }
.detected{ font-family:var(--pixel); font-size:9px; margin-top:6px; }
.modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
.status{ font-family:var(--pixel); font-size:9px; min-height:14px; margin-top:6px; line-height:1.6; }
.status.error{ color:var(--magenta); }
.status.ok{ color:var(--green); }

/* ── UNDO TOAST ── */
.toast{
  position:fixed; left:50%; bottom:24px; z-index:9600;
  display:flex; align-items:center; gap:14px; padding:12px 16px;
  opacity:0; pointer-events:none;
  transform:translateX(-50%) translateY(20px);
  transition:opacity .2s ease, transform .2s ease;
}
.toast.show{ opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
.toast span{ font-size:19px; max-width:60vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

footer{ text-align:center; padding:26px 16px 50px; color:var(--dim); font-size:18px; }
footer .pixel{ font-family:var(--pixel); font-size:9px; color:var(--line); }
</style>
</head>
<body>
  <header>
    <!-- ── MONTAGE HERO ──────────────────────────────────────────────
         Drop your edit at assets/montage.mp4 (muted/looping autoplay).
         Until the file exists, the animated placeholder below shows.
    -->
    <div class="montage" aria-hidden="true">
      <div class="montage-ph">
        <div class="film top"></div>
        <div class="film bottom"></div>
      </div>
      <video id="montage" class="montage-vid" autoplay muted loop playsinline preload="auto" poster="assets/montage-poster.jpg">
        <source src="assets/montage.webm" type="video/webm" />
        <source src="assets/montage.mp4" type="video/mp4" />
      </video>
      <div class="montage-scrim"></div>
    </div>

    <div class="header-inner">
      <h1>TROLLRUNNER <span class="arrow">▶</span> VIDEOS</h1>
    </div>
  </header>

  <main>
    <div class="toolbar pixel-box">
      <div class="left">
        <input id="search" class="search" type="search" placeholder="search videos…" aria-label="Search videos" />
      </div>
      <div class="right">
        <button id="admin-toggle" class="btn" type="button">🔓 ADMIN</button>
        <button id="add-video" class="btn green admin-only" type="button">＋ ADD VIDEO</button>
      </div>
    </div>

    <div class="filter-row" id="topic-filters" aria-label="Filter by topic">
      <span class="filter-label">TOPIC</span>
    </div>
    <div class="filter-row" id="tag-filters" aria-label="Filter by tag">
      <span class="filter-label">TAGS</span>
    </div>

    <div id="catalog" aria-live="polite"></div>
  </main>

  <!-- ADD VIDEO MODAL -->
  <div class="modal-back" id="modal-back">
    <div class="modal pixel-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h3 id="modal-title">＋ ADD VIDEO</h3>
      <div class="field">
        <label for="f-url">VIDEO LINK</label>
        <input id="f-url" type="url" placeholder="paste Drive / X / TikTok link" />
        <div class="hint">Drive: set the file to “Anyone with the link” first.</div>
        <div class="detected" id="f-detected"></div>
      </div>
      <div class="field">
        <label for="f-title">TITLE</label>
        <input id="f-title" type="text" placeholder="give it a name" />
      </div>
      <div class="field">
        <label for="f-topic">TOPIC</label>
        <input id="f-topic" list="topic-list" placeholder="e.g. Runs, Bloopers, Drops" />
        <datalist id="topic-list"></datalist>
      </div>
      <div class="field">
        <label for="f-tags">TAGS (comma separated)</label>
        <input id="f-tags" type="text" placeholder="inland-empire, sticker-drop" />
      </div>
      <div class="status" id="modal-status"></div>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel" type="button">CANCEL</button>
        <button class="btn green" id="modal-save" type="button">SAVE</button>
      </div>
    </div>
  </div>

  <!-- EDIT VIDEO MODAL (topic + tags) -->
  <div class="modal-back" id="edit-modal-back">
    <div class="modal pixel-box" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
      <h3 id="edit-modal-title">✎ EDIT VIDEO</h3>
      <div class="field">
        <label for="e-topic">TOPIC</label>
        <input id="e-topic" list="topic-list" placeholder="e.g. Runs, Bloopers, Drops" />
      </div>
      <div class="field">
        <label for="e-tags">TAGS (comma separated)</label>
        <input id="e-tags" type="text" placeholder="inland-empire, sticker-drop" />
      </div>
      <div class="status" id="edit-modal-status"></div>
      <div class="modal-actions">
        <button class="btn" id="edit-modal-cancel" type="button">CANCEL</button>
        <button class="btn green" id="edit-modal-save" type="button">SAVE</button>
      </div>
    </div>
  </div>

  <!-- DELETE UNDO TOAST -->
  <div class="toast pixel-box" id="undo-toast" role="status" aria-live="polite">
    <span id="undo-toast-msg"></span>
    <button class="btn" id="undo-toast-btn" type="button">UNDO</button>
  </div>

  <footer>
    <div class="pixel">TROLLRUNNER VIDEOS</div>
  </footer>

  <script>
    // Montage hero: reveal the video only once it actually loads; otherwise
    // the animated placeholder stays. Pause when scrolled offscreen.
    (function () {
      var v = document.getElementById('montage');
      if (!v) return;
      var hdr = v.closest('header');
      v.addEventListener('loadeddata', function () { hdr.classList.add('has-montage'); });
      if ('IntersectionObserver' in window) {
        new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) { v.play().catch(function () {}); } else { v.pause(); }
          });
        }, { threshold: 0.1 }).observe(v);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.3" integrity="sha384-uVefCux0Kf6w34gQVv8+jUPUwvwFUdnrcwI1kOJHs7sfPPXdDDucwcrPrppD6oUe" crossorigin="anonymous"></script>
  <script src="https://mayurski-art.github.io/assets/js/troll-notis.js"></script>
  <script src="assets/js/admin-auth.js"></script>
  <script src="assets/js/videos.js"></script>
  <script src="https://mayurski-art.github.io/assets/js/coming-soon.js"></script>
</body>
</html>
