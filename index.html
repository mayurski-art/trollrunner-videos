<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trollrunner-videos</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #07080d;
        color: #fff;
      }

      header {
        padding: 24px 18px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.16);
      }

      .site-nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .site-nav a {
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: #fff;
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
      }

      .site-nav a:hover {
        background: rgba(255,255,255,0.16);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 4rem);
        line-height: 1;
        text-transform: uppercase;
      }

      .text-view-note {
        margin: 12px auto 0;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        text-shadow: 0 2px 10px rgba(0,0,0,0.55);
      }

      main {
        width: min(760px, calc(100% - 36px));
        margin: 28px auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>trollrunner-videos</h1>
      <p class="text-view-note">Recommended text view be 50% for mobile and 100% tablet devices</p>
      <nav class="site-nav" aria-label="Site links">
        <a href="https://trollrunner.net">Main Site</a>
      </nav>
    </header>
    <main>
      <p>GitHub Pages site for videos.trollrunner.net</p>
    </main>

    <script src="https://mayurski-art.github.io/assets/js/troll-notis.js"></script>
    <script src="assets/js/site-lock.js"></script>
    <script src="assets/js/admin-auth.js"></script>
  </body>
</html>
